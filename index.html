<style>

button {
  background-color: rgb(214, 214, 214);
  border-radius: 30px;  
  color: rgb(50, 0, 83);
  padding: 1px;
  text-align: center;
  text-decoration: dashed;
  font-size: large;
  cursor: pointer;
  width: 150px;
  height: 110px;
  transition: .3s;
  filter: blur(1px) drop-shadow(0px 0px 10px rgb(133, 6, 238));
  transform: scale(1);
  transform: rotate(0deg);
  
  }
</style>




<style>

  }
  </style>
